name: e2e
on: 
  push:
    branches:
      - master
jobs:
  build:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v3

      - name: Checkout UI
        run: git clone Yam1x/to-dos-ui ./to-dos-ui
      
         
      - name: Install devcontainers
        uses: devcontainers/ci@v0.3
        with:
          configFile: ./to-dos-ui/.devcontainer/devcontainer.json
          runCmd: |
            echo "127.0.0.1 to-dos.local.tourmalinecore.internal" | sudo tee -a /etc/hosts
            kind create cluster --name to-dos --config kind-local-config.yaml --kubeconfig ./.to-dos-cluster-kubeconfig
            helmfile cache cleanup && helmfile --environment local --namespace local -f deploy/helmfile.yaml apply
            cd to-dos-ui
            npm ci
 

